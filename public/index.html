<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>德州扑克下注模拟器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="lobby-view" class="view">
      <div class="lobby-container">
        <h1 class="title">德州扑克下注模拟器</h1>
        <p class="subtitle">Texas Hold'em Betting Simulator</p>

        <div class="lobby-form">
          <div class="form-group">
            <label for="player-name">你的昵称</label>
            <input type="text" id="player-name" placeholder="请输入昵称" maxlength="12">
          </div>

          <div class="button-group">
            <button id="create-room-btn" class="btn btn-primary">
              <span class="btn-icon">+</span>
              创建房间
            </button>
          </div>

          <div class="divider">
            <span>或</span>
          </div>

          <div class="form-group">
            <label for="room-code">房间号</label>
            <input type="text" id="room-code" placeholder="输入房间号" maxlength="4">
          </div>

          <button id="join-room-btn" class="btn btn-secondary">
            <span class="btn-icon">→</span>
            加入房间
          </button>
        </div>

        <div id="room-list-container" class="room-list-container">
          <div class="room-list-header">
            <h3>可用房间</h3>
            <button id="refresh-rooms-btn" class="btn btn-small btn-secondary">刷新</button>
          </div>
          <div id="room-list" class="room-list">
            <div class="loading-text">加载中...</div>
          </div>
        </div>

        <div id="error-message" class="error-message"></div>
      </div>
    </div>

    <div id="waiting-view" class="view hidden">
      <div class="room-header">
        <div class="room-info">
          <span class="room-code">房间号: <strong id="display-room-code"></strong></span>
          <span class="copy-btn" id="copy-room-code" title="复制房间号">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </span>
        </div>
        <button id="leave-room-btn" class="btn btn-small btn-danger">离开房间</button>
      </div>

      <div class="players-list-container">
        <h2>玩家列表 <span id="player-count">(0/8)</span></h2>
        <div id="players-list" class="players-list"></div>
      </div>

      <div class="waiting-actions">
        <p class="waiting-text">等待其他玩家加入...</p>
        <button id="start-game-btn" class="btn btn-primary btn-large" disabled>开始游戏</button>
        <p class="hint">需要至少2名玩家才能开始</p>
      </div>
    </div>

    <div id="game-view" class="view hidden">
      <div class="game-header">
        <div class="game-info-left">
          <span class="room-code-small">房间: <strong id="game-room-code"></strong></span>
          <span class="round-info">第 <span id="betting-round">1</span> 轮下注</span>
        </div>
        <div class="game-info-right">
          <div class="pot-display">
            <span class="pot-label">底池</span>
            <span class="pot-amount" id="pot-amount">0</span>
          </div>
          <div class="current-bet-display">
            <span class="bet-label">当前下注</span>
            <span class="bet-amount" id="current-bet-amount">0</span>
          </div>
        </div>
      </div>

      <div class="game-table">
        <div class="table-center">
<div class="pot-section">
        </div>

        <div id="game-players" class="game-players"></div>
      </div>

      <div class="action-area">
        <div id="timer-display" class="timer-display hidden">
          <span id="timer-value">30</span>
        </div>
        <div id="action-info" class="action-info">
          <span id="turn-indicator">等待开始...</span>
        </div>

        <div id="action-buttons" class="action-buttons">
          <button id="check-btn" class="btn btn-action btn-check" disabled>
            <span class="action-name">Check</span>
            <span class="action-hint">过牌</span>
          </button>
          <button id="bet-btn" class="btn btn-action btn-bet" disabled>
            <span class="action-name">Bet</span>
            <span class="action-hint">下注</span>
          </button>
          <button id="call-btn" class="btn btn-action btn-call" disabled>
            <span class="action-name">Call</span>
            <span class="action-hint" id="call-amount">跟注 0</span>
          </button>
          <button id="raise-btn" class="btn btn-action btn-raise" disabled>
            <span class="action-name">Raise</span>
            <span class="action-hint">加注</span>
          </button>
          <button id="fold-btn" class="btn btn-action btn-fold" disabled>
            <span class="action-name">Fold</span>
            <span class="action-hint">弃牌</span>
          </button>
        </div>
      </div>

      <div id="bet-modal" class="modal hidden">
        <div class="modal-content">
          <h3 id="modal-title">下注</h3>
          <div class="bet-input-group">
            <button class="bet-adjust" id="bet-minus">-</button>
            <input type="number" id="bet-amount-input" min="10" value="10">
            <button class="bet-adjust" id="bet-plus">+</button>
          </div>
          <div class="bet-presets">
            <button class="bet-preset" data-amount="10">10</button>
            <button class="bet-preset" data-amount="25">25</button>
            <button class="bet-preset" data-amount="50">50</button>
            <button class="bet-preset" data-amount="100">100</button>
            <button class="bet-preset" data-amount="all">All-in</button>
          </div>
          <div class="modal-info">
            <span>你拥有: <strong id="modal-chips">1000</strong> 筹码</span>
          </div>
          <div class="modal-actions">
            <button id="modal-confirm" class="btn btn-primary">确认</button>
            <button id="modal-cancel" class="btn btn-secondary">取消</button>
          </div>
        </div>
      </div>

      <div id="toast" class="toast hidden">
        <span id="toast-message"></span>
      </div>

      <div id="result-modal" class="modal hidden">
        <div class="modal-content result-content">
          <h3 id="result-title">结算</h3>
          <div id="result-message"></div>
          <button id="result-close" class="btn btn-primary">确定</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
